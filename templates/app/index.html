<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>RFQ Cleaner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="#">RFQ Cleaner</a>
      </div>
    </nav>
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-sm">
            <div class="card-body">
              <h1 class="h4 mb-3">Upload RFQ Excel File</h1>
              <p class="text-muted">Select an Excel workbook with the expected RFQ sheets and receive a cleaned download.</p>
              {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
              {% endif %}
              <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                  <label for="file" class="form-label">Excel file</label>
                  <input class="form-control" type="file" id="file" name="file" accept=".xlsx,.xls">
                </div>
                <div class="d-flex justify-content-end">
                  <button type="submit" class="btn btn-primary">Clean File</button>
                </div>
              </form>
              <hr>
              <h2 class="h6">Supported sheets</h2>
              <p class="small mb-0">Aseem, Sunil, Samuel, Kajal, Shraddha, Sonali, Sachin, Rohan, Krushna</p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
